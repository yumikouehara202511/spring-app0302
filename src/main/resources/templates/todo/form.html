<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>顧客登録フォーム</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
    <style>
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .grid-column {
            grid-column: span 2;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4">顧客登録フォーム</h1>

                    <form action="/todo/confirm" method="post" id="userForm">
                        <div class="form-row mb-3">
                            <div>
                                <label for="id" class="form-label">ID</label>
                                <input id="id" name="id" type="number" class="form-control" min="1" step="1">
                            </div>
                            <div>
                                <label for="birthday" class="form-label">誕生日</label>
                                <input id="birthday" name="birthday" type="date" class="form-control">
                            </div>
                        </div>

                        <div class="form-row mb-3">
                            <div>
                                <label for="lastName" class="form-label">姓</label>
                                <input id="lastName" type="text" class="form-control">
                            </div>
                            <div>
                                <label for="firstName" class="form-label">名</label>
                                <input id="firstName" type="text" class="form-control">
                            </div>
                        </div>

                        <div class="form-row mb-3">
                            <div>
                                <label for="phone" class="form-label">電話番号</label>
                                <input id="phone" name="phone" type="tel" class="form-control">
                            </div>
                            <div>
                                <label for="visitDate" class="form-label">来店日</label>
                                <input id="visitDate" name="visitDate" type="date" class="form-control">
                            </div>
                        </div>

                        <div class="form-row mb-3">
                            <div>
                                <label for="amount" class="form-label">売上</label>
                                <div class="input-group">
                                    <input id="amount" name="amount" type="text" class="form-control" inputmode="numeric" autocomplete="off">
                                    <span class="input-group-text">円</span>
                                </div>
                            </div>
                            <div>
                                <label for="monthlyVisitsSelect" class="form-label">月別来店数</label>
                                <select id="monthlyVisitsSelect" class="form-select">
                                    <option value=""></option>
                                    <option value="月1回">月1回</option>
                                    <option value="月2回">月2回</option>
                                    <option value="月3回">月3回</option>
                                    <option value="月4回">月4回</option>
                                    <option value="月5回">月5回</option>
                                    <option value="月6回">月6回</option>
                                    <option value="月7回">月7回</option>
                                    <option value="月8回">月8回</option>
                                    <option value="月9回">月9回</option>
                                    <option value="月10回">月10回</option>
                                    <option value="月11回">月11回</option>
                                    <option value="月12回">月12回</option>
                                    <option value="月13回">月13回</option>
                                    <option value="月14回">月14回</option>
                                    <option value="月15回">月15回</option>
                                    <option value="月16回">月16回</option>
                                    <option value="月17回">月17回</option>
                                    <option value="月18回">月18回</option>
                                    <option value="月19回">月19回</option>
                                    <option value="月20回">月20回</option>
                                    <option value="月21回">月21回</option>
                                    <option value="月22回">月22回</option>
                                    <option value="月23回">月23回</option>
                                    <option value="月24回">月24回</option>
                                    <option value="月25回">月25回</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row-3 mb-3">
                            <div>
                                <label for="bottle1" class="form-label">ボトル1</label>
                                <select id="bottle1" class="form-select">
                                    <option value=""></option>
                                    <option value="キンミヤ">キンミヤ</option>
                                    <option value="黒霧">黒霧</option>
                                    <option value="角">角</option>
                                    <option value="知多">知多</option>
                                    <option value="アードベック">アードベック</option>
                                </select>
                            </div>
                            <div>
                                <label for="bottle2" class="form-label">ボトル2</label>
                                <select id="bottle2" class="form-select">
                                    <option value=""></option>
                                    <option value="キンミヤ">キンミヤ</option>
                                    <option value="黒霧">黒霧</option>
                                    <option value="角">角</option>
                                    <option value="知多">知多</option>
                                    <option value="アードベック">アードベック</option>
                                </select>
                            </div>
                            <div>
                                <label for="bottle3" class="form-label">ボトル3</label>
                                <select id="bottle3" class="form-select">
                                    <option value=""></option>
                                    <option value="キンミヤ">キンミヤ</option>
                                    <option value="黒霧">黒霧</option>
                                    <option value="角">角</option>
                                    <option value="知多">知多</option>
                                    <option value="アードベック">アードベック</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row mb-3">
                            <div>
                                <label for="companionCount" class="form-label">同席者</label>
                                <select id="companionCount" name="companionCount" class="form-select">
                                    <option value=""></option>
                                    <option value="0">0人</option>
                                    <option value="1">1人</option>
                                    <option value="2">2人</option>
                                    <option value="3">3人</option>
                                    <option value="4">4人</option>
                                    <option value="5">5人以上</option>
                                </select>
                            </div>
                            <div>
                                <label for="companionMemo" class="form-label">同席者メモ</label>
                                <input id="companionMemo" name="companionMemo" type="text" class="form-control">
                            </div>
                        </div>

                        <div class="form-row mb-4">
                            <div class="grid-column">
                                <label for="notes" class="form-label">備忘録欄</label>
                                <textarea id="notes" name="notes" rows="4" class="form-control"></textarea>
                            </div>
                        </div>

                        <input type="hidden" name="name" id="name">
                        <input type="hidden" name="monthlyVisits" id="monthlyVisits">
                        <input type="hidden" name="orderHistory" id="orderHistory">
                        <input type="hidden" name="salesTrendData" value="">
                        <input type="hidden" name="visitCountTrendData" value="">
                        <input type="hidden" name="visitDateTrendData" value="">
                        <input type="hidden" name="bottleTrendData" value="">

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">確認画面へ</button>
                            <button type="reset" class="btn btn-outline-secondary">リセット</button>
                            <button type="button" class="btn btn-outline-dark" onclick="history.back();">戻る</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function formatAmount(value) {
        var digits = value.replace(/[^\d]/g, "");
        if (!digits) return "";
        return Number(digits).toLocaleString("ja-JP");
    }

    var amountInput = document.getElementById("amount");
    amountInput.addEventListener("input", function () {
        amountInput.value = formatAmount(amountInput.value);
    });

    document.getElementById("userForm").addEventListener("submit", function () {
        var lastName = document.getElementById("lastName").value.trim();
        var firstName = document.getElementById("firstName").value.trim();
        document.getElementById("name").value = (lastName + " " + firstName).trim();

        var monthlyVisits = document.getElementById("monthlyVisitsSelect").value;
        document.getElementById("monthlyVisits").value = monthlyVisits;

        var bottles = [
            document.getElementById("bottle1").value,
            document.getElementById("bottle2").value,
            document.getElementById("bottle3").value
        ].filter(function (v) { return v; });
        document.getElementById("orderHistory").value = bottles.join(" / ");

        amountInput.value = amountInput.value.replace(/[^\d]/g, "");
    });
</script>
</body>
</html>
