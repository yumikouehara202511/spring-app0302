<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo新規登録</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4">ToDo新規登録</h1>

                    <div class="mb-3">
                        <label for="title" class="form-label">タイトル</label>
                        <input id="title" type="text" class="form-control" placeholder="タイトルを入力してください">
                    </div>

                    <div class="d-flex gap-2">
                        <a href="/todo/confirm" class="btn btn-primary">確認画面へ</a>
                        <a href="/todo" class="btn btn-outline-secondary">戻る</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
