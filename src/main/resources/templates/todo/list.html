<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a href="/todo/new" class="btn btn-primary">新規登録</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th scope="col" style="width: 80px;">ID</th>
                    <th scope="col">タイトル</th>
                    <th scope="col" style="width: 140px;">ステータス</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todoList}">
                    <td th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">サンプルToDo</td>
                    <td th:text="${todo.status}">未着手</td>
                </tr>
                <tr th:if="${#lists.isEmpty(todoList)}">
                    <td colspan="3" class="text-center text-muted py-4">ToDoはありません</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
