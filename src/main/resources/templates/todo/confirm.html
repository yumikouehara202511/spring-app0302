<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo登録確認</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <h1 class="h4 mb-3">登録内容の確認</h1>

            <form th:action="@{/todo/complete}" method="post">
                <div class="card shadow-sm mb-3">
                    <div class="card-header">確認内容</div>
                    <div class="card-body">
                        <h2 class="h6 text-muted mb-2">タイトル</h2>
                        <p class="mb-0 fw-semibold" th:text="${title}">サンプルタスク</p>
                    </div>
                </div>

                <input type="hidden" name="title" th:value="${title}">

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">登録</button>
                    <button type="button" class="btn btn-outline-secondary" onclick="history.back();">戻る</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
