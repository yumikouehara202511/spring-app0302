<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登録内容の確認</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 20%, #ffdbe9 0, #ffdbe9 18%, transparent 42%),
                        radial-gradient(circle at 85% 5%, #d4e4ff 0, #d4e4ff 15%, transparent 36%),
                        linear-gradient(135deg, #fff4f8 0%, #edf4ff 100%);
        }
        .wrap { max-width: 1220px; margin: 20px auto; padding: 0 12px; }
        .panel {
            background: rgba(255, 255, 255, 0.93);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(80, 95, 125, 0.14);
            backdrop-filter: blur(6px);
        }
        .profile {
            padding: 20px;
        }
        .ring {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f58529, #feda77, #dd2a7b, #8134af, #515bd4);
            padding: 3px;
            margin: 0 auto 12px;
        }
        .ring-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #374151;
        }
        .grid-edit {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 12px;
        }
        .grid-edit .full { grid-column: span 2; }
        .charts { padding: 20px; }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .chart-card {
            background: #fff;
            border: 1px solid #edf0f4;
            border-radius: 14px;
            padding: 12px;
        }
        .chart-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }
        .chart-title { font-size: 13px; font-weight: 700; color: #374151; margin: 0; }
        .mode-group { display: flex; gap: 4px; }
        .mode-btn {
            border: 1px solid #dbe2ea;
            background: #fff;
            border-radius: 8px;
            padding: 2px 8px;
            font-size: 11px;
            cursor: pointer;
        }
        .mode-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
        .chart-wrap { height: 220px; }
        .editor { margin-top: 10px; font-size: 12px; }
        .editor label { font-weight: 600; }
        .editor input { font-size: 12px; }
        @media (max-width: 992px) {
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <form th:action="@{/todo/complete}" method="post" id="confirmForm">
        <div class="row g-3">
            <div class="col-lg-4">
                <section class="panel profile">
                    <div class="ring">
                        <div class="ring-inner"
                             th:text="${name != null and !#strings.isEmpty(name) ? #strings.substring(name, 0, 1) : 'G'}">G</div>
                    </div>
                    <h1 class="h5 text-center mb-1">顧客登録フォーム</h1>
                    <p class="text-center text-muted mb-3">売上・来店データサマリー（編集可）</p>

                    <div class="grid-edit">
                        <div>
                            <label class="form-label form-label-sm">ID</label>
                            <input class="form-control form-control-sm" name="id" th:value="${id}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">名前</label>
                            <input class="form-control form-control-sm" name="name" th:value="${name}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">電話番号</label>
                            <input class="form-control form-control-sm" name="phone" th:value="${phone}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">誕生日</label>
                            <input class="form-control form-control-sm" name="birthday" th:value="${birthday}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">来店日</label>
                            <input class="form-control form-control-sm" name="visitDate" th:value="${visitDate}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">売上</label>
                            <input class="form-control form-control-sm" name="amount" id="amountInput" th:value="${amount}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">月別来店数</label>
                            <input class="form-control form-control-sm" name="monthlyVisits" id="monthlyVisitsInput" th:value="${monthlyVisits}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">同席者人数</label>
                            <input class="form-control form-control-sm" name="companionCount" th:value="${companionCount}">
                        </div>
                        <div class="full">
                            <label class="form-label form-label-sm">ボトル</label>
                            <input class="form-control form-control-sm" name="orderHistory" id="orderHistoryInput" th:value="${orderHistory}">
                        </div>
                        <div class="full">
                            <label class="form-label form-label-sm">同席者メモ</label>
                            <input class="form-control form-control-sm" name="companionMemo" th:value="${companionMemo}">
                        </div>
                        <div class="full">
                            <label class="form-label form-label-sm">備忘録</label>
                            <textarea class="form-control form-control-sm" name="notes" rows="3" th:text="${notes}"></textarea>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col-lg-8">
                <section class="panel charts">
                    <div class="chart-grid">
                        <article class="chart-card">
                            <div class="chart-head">
                                <p class="chart-title">売上推移</p>
                                <div class="mode-group" data-chart="sales">
                                    <button type="button" class="mode-btn active" data-mode="year">年別</button>
                                    <button type="button" class="mode-btn" data-mode="month">月別</button>
                                    <button type="button" class="mode-btn" data-mode="day">日別</button>
                                </div>
                            </div>
                            <div class="chart-wrap"><canvas id="salesChart"></canvas></div>
                            <div class="editor">
                                <label>年別データ(カンマ区切り)</label>
                                <input id="sales-year" class="form-control form-control-sm mb-1">
                                <label>月別データ(カンマ区切り)</label>
                                <input id="sales-month" class="form-control form-control-sm mb-1">
                                <label>日別データ(カンマ区切り)</label>
                                <input id="sales-day" class="form-control form-control-sm">
                            </div>
                        </article>

                        <article class="chart-card">
                            <div class="chart-head">
                                <p class="chart-title">来店数推移</p>
                                <div class="mode-group" data-chart="visitCount">
                                    <button type="button" class="mode-btn active" data-mode="year">年別</button>
                                    <button type="button" class="mode-btn" data-mode="month">月別</button>
                                    <button type="button" class="mode-btn" data-mode="day">日別</button>
                                </div>
                            </div>
                            <div class="chart-wrap"><canvas id="visitCountChart"></canvas></div>
                            <div class="editor">
                                <label>年別データ(カンマ区切り)</label>
                                <input id="visitCount-year" class="form-control form-control-sm mb-1">
                                <label>月別データ(カンマ区切り)</label>
                                <input id="visitCount-month" class="form-control form-control-sm mb-1">
                                <label>日別データ(カンマ区切り)</label>
                                <input id="visitCount-day" class="form-control form-control-sm">
                            </div>
                        </article>

                        <article class="chart-card">
                            <div class="chart-head">
                                <p class="chart-title">来店日トレンド</p>
                                <div class="mode-group" data-chart="visitDate">
                                    <button type="button" class="mode-btn active" data-mode="year">年別</button>
                                    <button type="button" class="mode-btn" data-mode="month">月別</button>
                                    <button type="button" class="mode-btn" data-mode="day">日別</button>
                                </div>
                            </div>
                            <div class="chart-wrap"><canvas id="visitDateChart"></canvas></div>
                            <div class="editor">
                                <label>年別データ(カンマ区切り)</label>
                                <input id="visitDate-year" class="form-control form-control-sm mb-1">
                                <label>月別データ(カンマ区切り)</label>
                                <input id="visitDate-month" class="form-control form-control-sm mb-1">
                                <label>日別データ(カンマ区切り)</label>
                                <input id="visitDate-day" class="form-control form-control-sm">
                            </div>
                        </article>

                        <article class="chart-card">
                            <div class="chart-head">
                                <p class="chart-title">ボトル注文傾向</p>
                                <div class="mode-group" data-chart="bottle">
                                    <button type="button" class="mode-btn active" data-mode="year">年別</button>
                                    <button type="button" class="mode-btn" data-mode="month">月別</button>
                                    <button type="button" class="mode-btn" data-mode="day">日別</button>
                                </div>
                            </div>
                            <div class="chart-wrap"><canvas id="bottleChart"></canvas></div>
                            <div class="editor">
                                <label>年別(キンミヤ,黒霧,角,知多,アードベック)</label>
                                <input id="bottle-year" class="form-control form-control-sm mb-1">
                                <label>月別(キンミヤ,黒霧,角,知多,アードベック)</label>
                                <input id="bottle-month" class="form-control form-control-sm mb-1">
                                <label>日別(キンミヤ,黒霧,角,知多,アードベック)</label>
                                <input id="bottle-day" class="form-control form-control-sm">
                            </div>
                        </article>
                    </div>
                </section>
            </div>
        </div>

        <input type="hidden" name="salesTrendData" id="salesTrendData">
        <input type="hidden" name="visitCountTrendData" id="visitCountTrendData">
        <input type="hidden" name="visitDateTrendData" id="visitDateTrendData">
        <input type="hidden" name="bottleTrendData" id="bottleTrendData">

        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">登録 / 更新する</button>
            <button type="button" class="btn btn-outline-secondary" onclick="history.back();">戻る</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    const amountRaw = Number(/*[[${amount}]]*/ 0) || 0;
    const monthlyVisitsRaw = /*[[${monthlyVisits}]]*/ "";
    const salesRaw = /*[[${salesTrendData}]]*/ "";
    const visitCountRaw = /*[[${visitCountTrendData}]]*/ "";
    const visitDateRaw = /*[[${visitDateTrendData}]]*/ "";
    const bottleRaw = /*[[${bottleTrendData}]]*/ "";

    function parseCsv(csv) {
        return (csv || "")
            .split(",")
            .map(v => Number(v.trim()))
            .filter(v => !isNaN(v));
    }

    function toCsv(values) {
        return (values || []).join(",");
    }

    function parseJson(raw, fallback) {
        if (!raw) return fallback;
        try { return JSON.parse(raw); } catch (e) { return fallback; }
    }

    const visitMatch = (monthlyVisitsRaw || "").match(/(\d+)/);
    const visitBase = visitMatch ? Number(visitMatch[1]) : 4;
    const salesBase = amountRaw > 0 ? amountRaw : 12000;

    const state = {
        sales: parseJson(salesRaw, {
            year: [Math.round(salesBase * 0.65), Math.round(salesBase * 0.8), Math.round(salesBase * 0.95), salesBase],
            month: [Math.round(salesBase * 0.55), Math.round(salesBase * 0.63), Math.round(salesBase * 0.78), Math.round(salesBase * 0.9), salesBase, Math.round(salesBase * 0.86)],
            day: [Math.round(salesBase * 0.15), Math.round(salesBase * 0.18), Math.round(salesBase * 0.2), Math.round(salesBase * 0.22), Math.round(salesBase * 0.19), Math.round(salesBase * 0.24), Math.round(salesBase * 0.26)]
        }),
        visitCount: parseJson(visitCountRaw, {
            year: [12, 18, 26, 32],
            month: [Math.max(1, visitBase - 2), Math.max(1, visitBase - 1), visitBase, visitBase + 1, visitBase + 1, visitBase + 2],
            day: [1, 0, 2, 1, 3, 2, 1]
        }),
        visitDate: parseJson(visitDateRaw, {
            year: [65, 72, 81, 93],
            month: [58, 60, 63, 67, 72, 76, 80, 85, 78, 88, 91, 95],
            day: [80, 75, 82, 86, 78, 91, 88]
        }),
        bottle: parseJson(bottleRaw, {
            year: [20, 16, 12, 9, 7],
            month: [8, 6, 5, 4, 3],
            day: [2, 1, 1, 1, 0]
        }),
        mode: { sales: "year", visitCount: "year", visitDate: "year", bottle: "year" }
    };

    const labels = {
        sales: {
            year: ["2023", "2024", "2025", "2026"],
            month: ["1月", "2月", "3月", "4月", "5月", "6月"],
            day: ["月", "火", "水", "木", "金", "土", "日"]
        },
        visitCount: {
            year: ["2023", "2024", "2025", "2026"],
            month: ["1月", "2月", "3月", "4月", "5月", "6月"],
            day: ["月", "火", "水", "木", "金", "土", "日"]
        },
        visitDate: {
            year: ["2023", "2024", "2025", "2026"],
            month: ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"],
            day: ["月", "火", "水", "木", "金", "土", "日"]
        },
        bottle: {
            year: ["キンミヤ", "黒霧", "角", "知多", "アードベック"],
            month: ["キンミヤ", "黒霧", "角", "知多", "アードベック"],
            day: ["キンミヤ", "黒霧", "角", "知多", "アードベック"]
        }
    };

    const chartDefs = {
        sales: { el: "salesChart", type: "bar", color: "#7c3aed" },
        visitCount: { el: "visitCountChart", type: "line", color: "#e11d48" },
        visitDate: { el: "visitDateChart", type: "line", color: "#2563eb" },
        bottle: { el: "bottleChart", type: "doughnut", color: "#06b6d4" }
    };

    const charts = {};

    function buildDataset(key, mode) {
        const data = state[key][mode];
        if (key === "bottle") {
            return [{
                data: data,
                backgroundColor: ["#4f46e5", "#22c55e", "#f59e0b", "#ef4444", "#a855f7"]
            }];
        }
        if (chartDefs[key].type === "line") {
            return [{
                data: data,
                borderColor: chartDefs[key].color,
                backgroundColor: "rgba(99,102,241,0.2)",
                fill: true,
                tension: 0.3
            }];
        }
        return [{
            data: data,
            backgroundColor: chartDefs[key].color,
            borderRadius: 6
        }];
    }

    function renderChart(key) {
        const mode = state.mode[key];
        const cfg = chartDefs[key];
        const ctx = document.getElementById(cfg.el);
        const data = {
            labels: labels[key][mode],
            datasets: buildDataset(key, mode)
        };
        if (charts[key]) {
            charts[key].data = data;
            charts[key].update();
            return;
        }
        charts[key] = new Chart(ctx, {
            type: cfg.type,
            data: data,
            options: { plugins: { legend: { display: key === "bottle" } } }
        });
    }

    function setEditorValues() {
        ["sales", "visitCount", "visitDate", "bottle"].forEach(function (key) {
            document.getElementById(key + "-year").value = toCsv(state[key].year);
            document.getElementById(key + "-month").value = toCsv(state[key].month);
            document.getElementById(key + "-day").value = toCsv(state[key].day);
        });
    }

    function bindEditors() {
        ["sales", "visitCount", "visitDate", "bottle"].forEach(function (key) {
            ["year", "month", "day"].forEach(function (mode) {
                const el = document.getElementById(key + "-" + mode);
                el.addEventListener("input", function () {
                    state[key][mode] = parseCsv(el.value);
                    if (state.mode[key] === mode) renderChart(key);
                });
            });
        });
    }

    document.querySelectorAll(".mode-group .mode-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
            const group = btn.closest(".mode-group");
            const key = group.getAttribute("data-chart");
            state.mode[key] = btn.getAttribute("data-mode");
            group.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            renderChart(key);
        });
    });

    const amountInput = document.getElementById("amountInput");
    amountInput.addEventListener("input", function () {
        const n = Number(String(amountInput.value).replace(/[^\d]/g, "")) || 0;
        amountInput.value = n ? n.toLocaleString("ja-JP") : "";
    });

    setEditorValues();
    bindEditors();
    renderChart("sales");
    renderChart("visitCount");
    renderChart("visitDate");
    renderChart("bottle");

    document.getElementById("confirmForm").addEventListener("submit", function () {
        amountInput.value = String(amountInput.value).replace(/[^\d]/g, "");
        document.getElementById("salesTrendData").value = JSON.stringify(state.sales);
        document.getElementById("visitCountTrendData").value = JSON.stringify(state.visitCount);
        document.getElementById("visitDateTrendData").value = JSON.stringify(state.visitDate);
        document.getElementById("bottleTrendData").value = JSON.stringify(state.bottle);
    });
</script>
</body>
</html>
