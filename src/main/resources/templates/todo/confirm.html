<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登録内容の確認</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 20%, #ffdbe9 0, #ffdbe9 18%, transparent 42%),
                        radial-gradient(circle at 85% 5%, #d4e4ff 0, #d4e4ff 15%, transparent 36%),
                        linear-gradient(135deg, #fff4f8 0%, #edf4ff 100%);
        }
        .wrap { max-width: 1220px; margin: 20px auto; padding: 0 12px; }
        .panel {
            background: rgba(255, 255, 255, 0.93);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(80, 95, 125, 0.14);
            backdrop-filter: blur(6px);
        }
        .profile { padding: 20px; }
        .ring {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f58529, #feda77, #dd2a7b, #8134af, #515bd4);
            padding: 3px;
            margin: 0 auto 12px;
        }
        .ring-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #374151;
        }
        .grid-edit {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 12px;
        }
        .grid-edit .full { grid-column: span 2; }
        .charts { padding: 20px; }
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }
        .summary-card {
            background: #fff;
            border: 1px solid #edf0f4;
            border-radius: 12px;
            padding: 12px;
        }
        .summary-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }
        .summary-value {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            line-height: 1.2;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .chart-card {
            background: #fff;
            border: 1px solid #edf0f4;
            border-radius: 14px;
            padding: 12px;
        }
        .chart-title {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            margin: 0 0 8px;
        }
        .chart-wrap { height: 220px; }
        @media (max-width: 992px) {
            .summary-grid, .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <form th:action="@{/todo/complete}" method="post" id="confirmForm">
        <div class="row g-3">
            <div class="col-lg-4">
                <section class="panel profile">
                    <div class="ring">
                        <div class="ring-inner"
                             th:text="${name != null and !#strings.isEmpty(name) ? #strings.substring(name, 0, 1) : 'G'}">G</div>
                    </div>
                    <h1 class="h5 text-center mb-1">顧客登録フォーム</h1>
                    <p class="text-center text-muted mb-3">入力値を変更するとグラフに反映されます</p>

                    <div class="grid-edit">
                        <div>
                            <label class="form-label form-label-sm">ID</label>
                            <input class="form-control form-control-sm" name="id" th:value="${id}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">名前</label>
                            <input class="form-control form-control-sm" name="name" th:value="${name}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">日付</label>
                            <input class="form-control form-control-sm" id="recordDateInput" type="date">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">来店日</label>
                            <input class="form-control form-control-sm" name="visitDate" id="visitDateInput" th:value="${visitDate}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">金額</label>
                            <input class="form-control form-control-sm" name="amount" id="amountInput" th:value="${amount}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">来店回数カウント</label>
                            <input class="form-control form-control-sm" name="monthlyVisits" id="monthlyVisitsInput" th:value="${monthlyVisits}" placeholder="例: 4">
                        </div>
                        <div class="full">
                            <label class="form-label form-label-sm">ボトル</label>
                            <select class="form-select form-select-sm" name="orderHistory" id="orderHistoryInput">
                                <option value="">選択してください</option>
                                <option value="キンミヤ" th:selected="${orderHistory == 'キンミヤ'}">キンミヤ</option>
                                <option value="黒霧" th:selected="${orderHistory == '黒霧'}">黒霧</option>
                                <option value="角" th:selected="${orderHistory == '角'}">角</option>
                                <option value="知多" th:selected="${orderHistory == '知多'}">知多</option>
                                <option value="アードベック" th:selected="${orderHistory == 'アードベック'}">アードベック</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label form-label-sm">電話番号</label>
                            <input class="form-control form-control-sm" name="phone" th:value="${phone}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">誕生日</label>
                            <input class="form-control form-control-sm" name="birthday" th:value="${birthday}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">同席者人数</label>
                            <input class="form-control form-control-sm" name="companionCount" th:value="${companionCount}">
                        </div>
                        <div>
                            <label class="form-label form-label-sm">同席者メモ</label>
                            <input class="form-control form-control-sm" name="companionMemo" th:value="${companionMemo}">
                        </div>
                        <div class="full">
                            <label class="form-label form-label-sm">備忘録</label>
                            <textarea class="form-control form-control-sm" name="notes" rows="3" th:text="${notes}"></textarea>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col-lg-8">
                <section class="panel charts">
                    <div class="summary-grid">
                        <div class="summary-card">
                            <div class="summary-label">今月の総売上</div>
                            <div class="summary-value" id="monthlySalesTotal">0円</div>
                        </div>
                        <div class="summary-card">
                            <div class="summary-label">今月の来店回数</div>
                            <div class="summary-value" id="monthlyVisitTotal">0回</div>
                        </div>
                    </div>

                    <div class="chart-grid">
                        <article class="chart-card">
                            <p class="chart-title">売上推移</p>
                            <div class="chart-wrap"><canvas id="salesChart"></canvas></div>
                        </article>
                        <article class="chart-card">
                            <p class="chart-title">来店数推移</p>
                            <div class="chart-wrap"><canvas id="visitCountChart"></canvas></div>
                        </article>
                        <article class="chart-card">
                            <p class="chart-title">来店日トレンド</p>
                            <div class="chart-wrap"><canvas id="visitDateChart"></canvas></div>
                        </article>
                        <article class="chart-card">
                            <p class="chart-title">ボトル注文傾向</p>
                            <div class="chart-wrap"><canvas id="bottleChart"></canvas></div>
                        </article>
                    </div>
                </section>
            </div>
        </div>

        <input type="hidden" name="salesTrendData" id="salesTrendData">
        <input type="hidden" name="visitCountTrendData" id="visitCountTrendData">
        <input type="hidden" name="visitDateTrendData" id="visitDateTrendData">
        <input type="hidden" name="bottleTrendData" id="bottleTrendData">

        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">登録 / 更新する</button>
            <button type="button" class="btn btn-outline-secondary" onclick="history.back();">戻る</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    const initialAmount = Number(/*[[${amount}]]*/ 0) || 0;
    const initialVisitText = /*[[${monthlyVisits}]]*/ "";
    const initialVisitDate = /*[[${visitDate}]]*/ "";
    const initialBottle = /*[[${orderHistory}]]*/ "";
    const initialSalesJson = /*[[${salesTrendData}]]*/ "";
    const initialVisitCountJson = /*[[${visitCountTrendData}]]*/ "";
    const initialVisitDateJson = /*[[${visitDateTrendData}]]*/ "";
    const initialBottleJson = /*[[${bottleTrendData}]]*/ "";

    const bottleNames = ["キンミヤ", "黒霧", "角", "知多", "アードベック"];

    function parseNumberFromText(value) {
        const n = Number(String(value || "").replace(/[^\d]/g, ""));
        return isNaN(n) ? 0 : n;
    }

    function parseVisitCount(value) {
        const match = String(value || "").match(/(\d+)/);
        return match ? Number(match[1]) : 0;
    }

    function parseJson(raw, fallback) {
        if (!raw) return fallback;
        try { return JSON.parse(raw); } catch (e) { return fallback; }
    }

    function toDateString(inputDate) {
        if (!inputDate) return "";
        const d = new Date(inputDate + "T00:00:00");
        if (isNaN(d.getTime())) return "";
        return inputDate;
    }

    const amountInput = document.getElementById("amountInput");
    const monthlyVisitsInput = document.getElementById("monthlyVisitsInput");
    const visitDateInput = document.getElementById("visitDateInput");
    const recordDateInput = document.getElementById("recordDateInput");
    const bottleInput = document.getElementById("orderHistoryInput");

    recordDateInput.value = toDateString(initialVisitDate) || toDateString(new Date().toISOString().slice(0, 10));

    const fallbackLabels = ["1月", "2月", "3月", "4月", "5月", "6月"];
    const fallbackSales = [8000, 9200, 9800, 10600, 11300, 12100];
    const fallbackVisits = [2, 3, 3, 4, 5, 6];
    const fallbackVisitDate = [60, 66, 70, 74, 79, 83];
    const fallbackBottle = [8, 6, 5, 3, 2];

    const savedSales = parseJson(initialSalesJson, null);
    const savedVisitCount = parseJson(initialVisitCountJson, null);
    const savedVisitDate = parseJson(initialVisitDateJson, null);
    const savedBottle = parseJson(initialBottleJson, null);

    function normalizeSeries(saved, fallbackValues) {
        if (saved && Array.isArray(saved.values) && Array.isArray(saved.labels)) {
            return { labels: saved.labels.slice(), values: saved.values.slice() };
        }
        if (saved && Array.isArray(saved.month)) {
            return { labels: fallbackLabels.slice(0, saved.month.length), values: saved.month.slice() };
        }
        return { labels: fallbackLabels.slice(), values: fallbackValues.slice() };
    }

    const state = {
        sales: normalizeSeries(savedSales, fallbackSales),
        visitCount: normalizeSeries(savedVisitCount, fallbackVisits),
        visitDate: normalizeSeries(savedVisitDate, fallbackVisitDate),
        bottle: (savedBottle && Array.isArray(savedBottle.month)) ? savedBottle.month.slice() : fallbackBottle.slice()
    };

    const charts = {};
    let lastSignature = "";

    function pushCapped(series, label, value) {
        series.labels.push(label);
        series.values.push(value);
        if (series.labels.length > 20) {
            series.labels.shift();
            series.values.shift();
        }
    }

    function dateLabelForSeries() {
        const base = recordDateInput.value || visitDateInput.value || new Date().toISOString().slice(0, 10);
        const d = new Date(base + "T00:00:00");
        if (isNaN(d.getTime())) return "不明";
        return (d.getMonth() + 1) + "/" + d.getDate();
    }

    function appendFromInputs() {
        const amount = parseNumberFromText(amountInput.value) || initialAmount || 0;
        const visitCount = parseVisitCount(monthlyVisitsInput.value) || parseVisitCount(initialVisitText) || 0;
        const selectedBottle = bottleInput.value || initialBottle;
        const label = dateLabelForSeries();
        const visitScore = Math.max(45, Math.min(100, 55 + visitCount * 6));

        const signature = [label, amount, visitCount, selectedBottle].join("|");
        if (signature === lastSignature) return;
        lastSignature = signature;

        if (amount > 0) pushCapped(state.sales, label, amount);
        if (visitCount > 0) {
            pushCapped(state.visitCount, label, visitCount);
            pushCapped(state.visitDate, label, visitScore);
        }

        const idx = bottleNames.indexOf(selectedBottle);
        if (idx >= 0) state.bottle[idx] = (state.bottle[idx] || 0) + 1;
    }

    function renderCharts() {
        const salesData = {
            labels: state.sales.labels,
            datasets: [{
                label: "売上",
                data: state.sales.values,
                backgroundColor: "#7c3aed",
                borderRadius: 6
            }]
        };

        const visitsData = {
            labels: state.visitCount.labels,
            datasets: [{
                label: "来店回数",
                data: state.visitCount.values,
                borderColor: "#e11d48",
                backgroundColor: "rgba(225, 29, 72, 0.18)",
                fill: true,
                tension: 0.3
            }]
        };

        const visitDateData = {
            labels: state.visitDate.labels,
            datasets: [{
                label: "来店日スコア",
                data: state.visitDate.values,
                borderColor: "#2563eb",
                backgroundColor: "rgba(37, 99, 235, 0.15)",
                fill: true,
                tension: 0.25
            }]
        };

        const bottleData = {
            labels: bottleNames,
            datasets: [{
                data: state.bottle,
                backgroundColor: ["#4f46e5", "#22c55e", "#f59e0b", "#ef4444", "#a855f7"]
            }]
        };

        function upsertChart(key, elementId, type, data, showLegend) {
            if (charts[key]) {
                charts[key].data = data;
                charts[key].update();
                return;
            }
            charts[key] = new Chart(document.getElementById(elementId), {
                type: type,
                data: data,
                options: { plugins: { legend: { display: showLegend } } }
            });
        }

        upsertChart("sales", "salesChart", "bar", salesData, false);
        upsertChart("visitCount", "visitCountChart", "line", visitsData, false);
        upsertChart("visitDate", "visitDateChart", "line", visitDateData, false);
        upsertChart("bottle", "bottleChart", "doughnut", bottleData, true);
    }

    function updateSummary() {
        const salesTotal = state.sales.values.reduce((a, b) => a + b, 0);
        const visitsTotal = state.visitCount.values.reduce((a, b) => a + b, 0);
        document.getElementById("monthlySalesTotal").textContent = salesTotal.toLocaleString("ja-JP") + "円";
        document.getElementById("monthlyVisitTotal").textContent = visitsTotal.toLocaleString("ja-JP") + "回";
    }

    function refreshAll() {
        appendFromInputs();
        renderCharts();
        updateSummary();
    }

    amountInput.addEventListener("input", function () {
        const n = parseNumberFromText(amountInput.value);
        amountInput.value = n ? n.toLocaleString("ja-JP") : "";
        refreshAll();
    });
    monthlyVisitsInput.addEventListener("input", refreshAll);
    visitDateInput.addEventListener("change", function () {
        if (visitDateInput.value) recordDateInput.value = visitDateInput.value;
        refreshAll();
    });
    recordDateInput.addEventListener("change", refreshAll);
    bottleInput.addEventListener("change", refreshAll);

    renderCharts();
    updateSummary();

    document.getElementById("confirmForm").addEventListener("submit", function () {
        amountInput.value = String(amountInput.value).replace(/[^\d]/g, "");
        document.getElementById("salesTrendData").value = JSON.stringify(state.sales);
        document.getElementById("visitCountTrendData").value = JSON.stringify(state.visitCount);
        document.getElementById("visitDateTrendData").value = JSON.stringify(state.visitDate);
        document.getElementById("bottleTrendData").value = JSON.stringify({ month: state.bottle });
    });
</script>
</body>
</html>
